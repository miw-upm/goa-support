server:
  port: 8084

info:
  app:
    artifact: "@project.artifactId@"
    version: "@project.version@"
    build: "@maven.build.timestamp@"

spring:
  application:
    name: goa-support
  profiles:
    default: dev
  output:
    ansi:
      enabled: ALWAYS
  cache:
    type: none
  jackson:
    default-property-inclusion: NON_NULL
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${BASE_URL:http://localhost:8080}/api/goa-user/oauth2/jwks
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:ocanabogados.derecho@gmail.com}
    password: ${MAIL_PASSWORD:aaaa bbbb cccc dddd}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  oauth2:
    token-uri: ${BASE_URL:http://localhost:8080}/api/goa-user/oauth2/token
    api-client-id: ${API_CLIENT_ID:api-client-id}
    api-client-secret: ${API_CLIENT_SECRET:api-client-secret}
  mail:
    from: ${MAIL_FROM:ocanabogados.derecho@gmail.com}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    es.upm.api: DEBUG

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

name: CD
on:
  push:
    branches:
      - staging

jobs:
  cd:
    name: Build & Push GitHub Package & Deploy on AWS Lightsail
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 🏷️ Prepare container image metadata (repository in lowercase, artifact, version...)
        run: |
          echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV          
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: 📦 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PERSONAL_ACCESS_TOKEN }}

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPOSITORY }}:${{ env.VERSION }}
            ghcr.io/${{ env.REPOSITORY }}:latest

      - name: 🚀 Deploy on AWS Lightsail
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.AWS_LIGHTSAIL_IP_STAGING }}
          username: ${{ secrets.AWS_LIGHTSAIL_USER_STAGING }}
          key: ${{ secrets.AWS_LIGHTSAIL_SSH_KEY_STAGING }}
          script: |
            echo ${{ secrets.GHCR_PERSONAL_ACCESS_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker rm -f ${{ env.ARTIFACT }} || true
            docker pull ghcr.io/${{ env.REPOSITORY }}:latest
            docker run -d \
              --name ${{ env.ARTIFACT }} \
              --restart always \
              --memory 512m \
              --memory-swap 1024m \
              --network goa \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e BASE_URL="https://goa.miwupm.es" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_GMAIL_PASSWORD }}" \
              -e API_CLIENT_ID="${{ secrets.API_CLIENT_ID }}" \
              -e API_CLIENT_SECRET="${{ secrets.API_CLIENT_SECRET }}" \
              ghcr.io/${{ env.REPOSITORY }}:latest
            sleep 20
            docker image prune --filter "until=12h" -f
